name: nest-order-microservice

services:
# ==============================
# Postgres Database
# ==============================
  postgres:
    image: postgres:17-alpine
    container_name: postgres_database
    hostname: postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${TYPEORM_USERNAME}
      POSTGRES_PASSWORD: ${TYPEORM_PASSWORD}
      POSTGRES_DB: ${TYPEORM_DATABASE}
    ports:
      - "${TYPEORM_PORT}:5432"
    healthcheck:
      test: [
        "CMD-SHELL", 
        "pg_isready -U ${TYPEORM_USERNAME} -d ${TYPEORM_DATABASE}"
      ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    volumes:
      - postgres_order_microservice_data:/var/lib/postgresql/data
    networks:
      - microservice_network

# ==============================
# RabbitMQ Broker
# ==============================
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq_broker
    hostname: rabbitmq
    env_file:
      - .env
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "${RABBITMQ_PORT}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT}:15672"
    healthcheck:
      test: [
        "CMD", 
        "rabbitmq-diagnostics", 
        "-q", 
        "ping"
      ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    volumes: 
      - rabbitmq_order_microservice_data:/var/lib/rabbitmq
    networks:
      - microservice_network

volumes:
  postgres_order_microservice_data:
  rabbitmq_order_microservice_data:

networks:
  microservice_network:
    driver: bridge